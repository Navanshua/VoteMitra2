version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-votermitra-2026}
      - GCP_REGION=${GCP_REGION:-asia-south1}
      - VERTEX_AI_LOCATION=${VERTEX_AI_LOCATION:-asia-south1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GCP_API_KEY=${GCP_API_KEY}
      - DIALOGFLOW_AGENT_ID=${DIALOGFLOW_AGENT_ID}
      - DIALOGFLOW_LOCATION=${DIALOGFLOW_LOCATION:-global}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GCP_API_KEY: ${VITE_GCP_API_KEY}
        VITE_GCP_PROJECT_ID: ${VITE_GCP_PROJECT_ID:-votermitra-2026}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
        VITE_MESSAGING_SENDER_ID: ${VITE_MESSAGING_SENDER_ID}
        VITE_APP_ID: ${VITE_APP_ID}
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
